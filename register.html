<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация - Презентации на заказ</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="bi bi-stars me-2"></i>Презентации
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
          <li class="nav-item"><a class="nav-link" href="services.html">Услуги</a></li>
          <li class="nav-item"><a class="nav-link" href="prices.html">Цены</a></li>
          <li class="nav-item"><a class="nav-link" href="order.html">Заказать</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">О нас</a></li>
          <li class="nav-item"><a class="nav-link" href="reviews.html">Отзывы</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-5 pt-5">
    <div class="row justify-content-center min-vh-100 align-items-center">
      <div class="col-md-5">
        <div class="form-custom p-5">
          <h2 class="text-center mb-4">Регистрация</h2>
          
          <form id="registerForm">
            <div class="mb-3">
              <label for="regName" class="form-label">Имя</label>
              <input type="text" class="form-control" id="regName" placeholder="Введите имя" required>
            </div>
            <div class="mb-3">
              <label for="regEmail" class="form-label">Email</label>
              <input type="email" class="form-control" id="regEmail" placeholder="Введите email" required>
            </div>
            <div class="mb-3">
              <label for="regPassword" class="form-label">Пароль</label>
              <input type="password" class="form-control" id="regPassword" placeholder="Минимум 6 символов" required minlength="6">
            </div>
            <div id="regError" class="text-danger mb-3" style="display:none;"></div>
            <div id="regSuccess" class="text-success mb-3" style="display:none;"></div>
            <button type="submit" class="btn btn-custom w-100 mb-3">
              <i class="bi bi-person-plus me-2"></i>Зарегистрироваться
            </button>
            <p class="text-center">
              Уже есть аккаунт? <a href="login.html" style="color: #e0aaff;">Войти</a>
            </p>
            <p class="text-center">
              <a href="index.html" style="color: rgba(255,255,255,0.6);">← На главную</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer-custom text-white py-4 mt-5">
    <div class="container text-center">
      <p class="mb-0">&copy; 2025 Профессиональные презентации. Все права защищены.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  
  <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const errorDiv = document.getElementById('regError');
      const successDiv = document.getElementById('regSuccess');
      
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      
      // Пробуем через сервер
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        
        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem('token', data.token);
          successDiv.textContent = 'Регистрация успешна! Переадресация...';
          successDiv.style.display = 'block';
          setTimeout(() => window.location.href = 'cabinet.html', 1000);
        } else {
          errorDiv.textContent = data.error || 'Ошибка регистрации';
          errorDiv.style.display = 'block';
        }
      } catch (err) {
        // Оффлайн-режим
        const users = JSON.parse(localStorage.getItem('users')) || [];
        
        if (users.find(u => u.email === email)) {
          errorDiv.textContent = 'Пользователь с таким email уже существует';
          errorDiv.style.display = 'block';
          return;
        }
        
        const newUser = { id: Date.now(), name, email, password };
        users.push(newUser);
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('token', 'local_token_' + newUser.id);
        localStorage.setItem('userProfile', JSON.stringify(newUser));
        
        successDiv.textContent = 'Регистрация успешна! Переадресация...';
        successDiv.style.display = 'block';
        setTimeout(() => window.location.href = 'cabinet.html', 1000);
      }
    });
  </script>
</body>
</html>
